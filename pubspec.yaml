name: aloe_wellness_coach
description: "A premium Ukrainian wellness nutrition coach app inspired by aloe-based routines."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  collection: ^1.19.1
  connectivity_plus: ^7.0.0
  cupertino_icons: ^1.0.8
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  fl_chart: ^1.2.0
  flutter_local_notifications: ^21.0.0
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^10.0.0
  go_router: ^17.1.0
  http: ^1.6.0
  intl: ^0.20.2
  package_info_plus: ^9.0.0
  shared_preferences: ^2.5.5
  supabase_flutter: ^2.12.2
  timezone: ^0.11.0
  url_launcher: ^6.3.2
  uuid: ^4.5.3
  webview_flutter: ^4.13.1

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/env/
